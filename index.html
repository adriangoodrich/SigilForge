<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
<title>SigilForge 🔮</title>

<!-- ══ PWA ══════════════════════════════════════════ -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f3460">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Share+Tech+Mono&family=MedievalSharp&family=UnifrakturMaguntia&family=Pirata+One&family=Almendra&display=swap');

:root {
  --bg: #1a1a2e; --panel: #16213e; --panel2: #0f3460;
  --border: #2a2a4a; --accent: #e94560; --blue: #4a9eff;
  --text: #c8d6e5; --muted: #6a7a8a; --inp: #0d1b2a; --sec: #1e2a3a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; min-width: 900px; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Share Tech Mono', monospace; font-size: 12px;
  display: flex; flex-direction: column;
}
header {
  background: var(--panel2); padding: .4rem .8rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: .8rem; flex-shrink: 0;
}
header h1 { font-family:'Cinzel',serif; font-size:.85rem; color:var(--blue); letter-spacing:.15em; }
.ver { font-family:'Share Tech Mono',monospace; font-size:.55rem; color:var(--muted); letter-spacing:.05em; margin-top:.15rem; align-self:flex-end; }
.header-spacer { flex:1; }

/* ── UPDATE TOAST ── */
#updateToast {
  position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
  background: #0f3460; border: 1px solid var(--blue);
  border-left: 3px solid var(--blue);
  color: var(--text); font-family:'Share Tech Mono',monospace; font-size:.7rem;
  padding: .55rem .9rem; border-radius: 4px; z-index: 9999;
  display: none; align-items: center; gap: .7rem;
  box-shadow: 0 4px 20px rgba(74,158,255,.25);
  animation: toastIn .3s ease;
  white-space: nowrap;
}
#updateToast.visible { display: flex; }
@keyframes toastIn {
  from { opacity:0; transform:translateX(-50%) translateY(12px); }
  to   { opacity:1; transform:translateX(-50%) translateY(0); }
}
#updateToast .toast-msg { color: var(--blue); }
#updateToast .toast-ver { color: var(--muted); font-size:.6rem; }
.toast-btn {
  background: var(--blue); color: #0d1b2a; border: none;
  font-family:'Share Tech Mono',monospace; font-size:.62rem;
  padding: .25rem .55rem; border-radius: 2px; cursor: pointer;
  letter-spacing:.05em; text-transform:uppercase;
}
.toast-btn:hover { background:#6ab8ff; }
.toast-close {
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size:.8rem; padding:0; line-height:1;
}
.toast-close:hover { color: var(--text); }

/* ── DONATE BUTTON ── */
.btn-donate {
  display: flex; align-items: center; justify-content: center; gap: .4rem;
  width: calc(100% - 1.2rem); margin: .35rem .6rem .6rem;
  padding: .4rem .2rem; border: 1px solid #d4a017;
  background: rgba(212,160,23,.12); color: #d4a017;
  font-family:'Share Tech Mono',monospace; font-size:.63rem;
  letter-spacing:.06em; cursor: pointer; border-radius: 2px;
  text-decoration: none; text-transform: uppercase;
  transition: background .15s, color .15s;
}
.btn-donate:hover { background: rgba(212,160,23,.28); color: #f0c040; }

/* ── MAIN ROW ── */
.main { display: flex; flex: 1; min-height: 0; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width: 230px; min-width: 200px; flex-shrink: 0;
  background: var(--panel); border-right: 1px solid var(--border);
  overflow-y: auto; overflow-x: hidden;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); }

.sec { border-bottom: 1px solid var(--border); }
.sec-h {
  display: flex; justify-content: space-between; align-items: center;
  padding: .4rem .6rem; background: var(--sec); cursor: pointer;
  user-select: none; font-size: .68rem; letter-spacing: .1em;
  color: var(--blue); text-transform: uppercase;
}
.sec-h:hover { background: #253545; }
.sec.closed .ch { transform: rotate(-90deg); }
.sec.closed .sec-b { display: none; }
.ch { font-size: .55rem; transition: transform .2s; }
.sec-b { padding: .5rem .6rem; display: flex; flex-direction: column; gap: .4rem; }

.f { display: flex; align-items: center; justify-content: space-between; gap: .4rem; }
.f label { color: var(--muted); font-size: .68rem; white-space: nowrap; flex-shrink: 0; min-width: 85px; }
.f input[type=number], .f select {
  background: var(--inp); border: 1px solid var(--border); color: var(--text);
  font-family: 'Share Tech Mono', monospace; font-size: .68rem;
  padding: .2rem .35rem; border-radius: 2px; width: 100%; outline: none;
}
.f input[type=range] {
  -webkit-appearance: none; width: 100%; height: 4px;
  background: var(--inp); border: 1px solid var(--border); border-radius: 2px; outline: none;
}
.f input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 12px; height: 12px;
  border-radius: 50%; background: var(--blue); cursor: pointer;
}
.f input[type=color] {
  -webkit-appearance: none; width: 100%; height: 22px;
  border: 1px solid var(--border); border-radius: 2px; background: none; cursor: pointer; padding: 1px;
}
.cb { display: flex; align-items: center; gap: .4rem; padding: .05rem 0; }
.cb input[type=checkbox] { accent-color: var(--blue); width: 12px; height: 12px; cursor: pointer; }
.cb label { color: var(--text); font-size: .68rem; cursor: pointer; }
textarea.rt {
  background: var(--inp); border: 1px solid var(--border); color: var(--text);
  font-family: 'Share Tech Mono', monospace; font-size: .62rem;
  padding: .3rem; border-radius: 2px; width: 100%; height: 48px; resize: vertical; outline: none;
}
.seed-d { font-size: .58rem; color: var(--muted); word-break: break-all; }
.btn-row { display: flex; gap: .35rem; padding: .5rem .6rem; }
.btn {
  flex: 1; padding: .4rem .2rem; border: none;
  font-family: 'Share Tech Mono', monospace; font-size: .65rem;
  letter-spacing: .06em; cursor: pointer; border-radius: 2px; text-transform: uppercase;
}
.bp { background: var(--blue); color: #0d1b2a; }
.bp:hover { background: #6ab8ff; }
.bs { background: var(--accent); color: white; }
.bs:hover { background: #ff6080; }
.bn { background: var(--sec); color: var(--text); border: 1px solid var(--border); }
.bn:hover { background: #253545; }

/* ── CANVAS AREA ── */
.canvas-wrap {
  flex: 1; min-width: 0; min-height: 0;
  display: flex; align-items: center; justify-content: center;
  background: #111122; overflow: hidden; position: relative;
}
/* Canvas fills its container, JS sizes it to actual pixels */
#mc { display: block; }
.info-bar {
  position: absolute; bottom: .4rem; right: .6rem;
  font-size: .6rem; color: var(--muted); pointer-events: none;
}
</style>
</head>

<script>
'use strict';

// ── RNG (xorshift32, deterministic) ──
let _rngSt = 1;
function sRng(s) { _rngSt = Math.max(1, (s * 0x7fffffff) >>> 0); }
function rng() {
  _rngSt ^= _rngSt << 13; _rngSt ^= _rngSt >>> 17; _rngSt ^= _rngSt << 5;
  return (_rngSt >>> 0) / 0xffffffff;
}

// ── STATE ──
let SEED = 0.42718;
let _frame = null;       // single rAF handle
let _drawing = false;    // re-entrancy guard
let _rot = 0;
let _lastT = 0;

// ── READ ALL PARAMS FRESH FROM DOM ──
function P() {
  const v = id => document.getElementById(id).value;
  const n = id => parseFloat(v(id));
  const b = id => document.getElementById(id).checked;
  return {
    borderW: n('borderW'), margin: n('margin'), borderSp: n('borderSp'),
    lineW: n('lineW'), bgC: v('bgC'), lineC: v('lineC'), accentC: v('accentC'),
    tiers: Math.max(1, Math.round(n('tiers'))),
    numSym: Math.max(3, Math.round(n('numSym'))),
    complex: n('complexity'), subSc: n('subSc'),
    deltaSym: Math.round(n('deltaSym')),
    bordSp2: n('bordSp2'), conSkip: Math.max(1, Math.round(n('conSkip'))),
    oCB: b('oCB'), oMP: b('oMP'), oCP: b('oCP'), oIP: b('oIP'),
    oLC: b('oLC'), oSR: b('oSR'), oSP: b('oSP'), oSC: b('oSC'),
    oIG: b('oIG'), oAR: b('oAR'), oT1: b('oT1'), oT2: b('oT2'),
    rt1: v('rt1'), rt2: v('rt2'), txtSz: n('txtSz'), txtSp: n('txtSp'),
    symSet: v('symSet'),   // always read fresh — this is the key field
    symSz: n('symSz'),
  };
}

// ═══════════════════════════════════════════
// DRAW SYMBOL — pure canvas paths, no fonts
// 5 sets × 12 symbols each
// ═══════════════════════════════════════════
function DS(ctx, set, idx, size) {
  const i = ((Math.floor(idx) % 12) + 12) % 12;
  const h = size * 0.45;
  ctx.save();
  ctx.lineWidth = Math.max(1.5, size * 0.12);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // helpers
  const B = () => ctx.beginPath();
  const M = (x,y) => ctx.moveTo(x,y);
  const L = (x,y) => ctx.lineTo(x,y);
  const S = () => ctx.stroke();
  const F = () => ctx.fill();
  const ln = (x1,y1,x2,y2) => { B(); M(x1,y1); L(x2,y2); S(); };
  const arc = (x,y,r,a,e,ccw) => { B(); ctx.arc(x,y,r,a,e,ccw); S(); };
  const circle = (r) => arc(0,0,r,0,Math.PI*2);
  const poly = (n,r,a0) => {
    B();
    for(let k=0;k<=n;k++){const a=k/n*Math.PI*2+a0; k?L(Math.cos(a)*r,Math.sin(a)*r):M(Math.cos(a)*r,Math.sin(a)*r);}
    ctx.closePath(); S();
  };

  // ── ALCHEMICAL ──
  if (set === 'alchemical') {
    const D = [
      () => poly(3, h, -Math.PI/2),                                             // 0 Fire △
      () => poly(3, h, Math.PI/2),                                              // 1 Water ▽
      () => { poly(3,h,Math.PI/2); ln(-h*.5,-h*.12,h*.5,-h*.12); },            // 2 Earth (▽ + bar)
      () => { poly(3,h,-Math.PI/2); ln(-h*.5,h*.18,h*.5,h*.18); },             // 3 Air (△ + bar)
      () => { poly(3,h*.65,-Math.PI/2); ln(0,h*.65,0,h); ln(-h*.4,h*.82,h*.4,h*.82); }, // 4 Sulfur
      () => { circle(h*.42); ln(0,h*.42,0,h); ln(-h*.38,h*.7,h*.38,h*.7); arc(0,-h*.38,h*.3,Math.PI,0); }, // 5 Mercury
      () => { circle(h*.5); ln(-h*.5,0,h*.5,0); },                             // 6 Salt ⊖
      () => { circle(h*.5); B(); ctx.arc(0,0,h*.13,0,Math.PI*2); F(); },       // 7 Gold ☉
      () => { arc(h*.2,0,h*.5,Math.PI*.55,Math.PI*1.45); arc(-h*.2,0,h*.5,Math.PI*1.55,Math.PI*.45); }, // 8 Silver
      () => { arc(-h*.1,h*.1,h*.36,0,Math.PI*2); ln(h*.18,-h*.14,h*.7,-h*.65); ln(h*.35,-h*.65,h*.7,-h*.65); ln(h*.7,-h*.65,h*.7,-h*.3); }, // 9 Iron ♂
      () => { arc(0,-h*.2,h*.36,0,Math.PI*2); ln(0,h*.16,0,h*.9); ln(-h*.35,h*.54,h*.35,h*.54); }, // 10 Copper ♀
      () => { B();M(-h*.3,-h*.7);L(-h*.3,h*.2);ctx.arc(-h*.05,h*.2,h*.28,Math.PI,0);L(h*.23,h*.82);S(); ln(-h*.65,h*.05,h*.5,h*.05); }, // 11 Tin ♃
    ];
    D[i]();
  }

  // ── CELESTIAL ──
  else if (set === 'celestial') {
    const D = [
      () => { circle(h*.5); B(); ctx.arc(0,0,h*.13,0,Math.PI*2); F(); },        // 0 Sun
      () => { circle(h*.5); arc(h*.3,0,h*.42,Math.PI*.52,Math.PI*1.48,true); }, // 1 Moon crescent
      () => { // 2 Five-point star
        B(); const p=Array.from({length:5},(_,k)=>[Math.cos(k/5*Math.PI*2-Math.PI/2)*h,Math.sin(k/5*Math.PI*2-Math.PI/2)*h]);
        M(p[0][0],p[0][1]); [2,4,1,3,0].forEach(k=>L(p[k][0],p[k][1])); S();
      },
      () => { arc(h*.05,-h*.12,h*.36,0,Math.PI*2); ln(-h*.3,h*.24,h*.2,h*.24); B();M(-h*.1,h*.24);L(-h*.1,h*.82);ctx.arc(h*.06,h*.82,h*.16,Math.PI,0);S(); }, // 3 Saturn
      () => { B();M(-h*.22,-h*.6);L(-h*.22,h*.18);ctx.arc(0,h*.18,h*.26,Math.PI,0);L(h*.04,h*.8);S(); ln(-h*.65,h*.04,h*.52,h*.04); }, // 4 Jupiter
      () => { arc(-h*.1,h*.1,h*.34,0,Math.PI*2); ln(h*.15,-h*.1,h*.68,-h*.65); ln(h*.32,-h*.65,h*.68,-h*.65); ln(h*.68,-h*.65,h*.68,-h*.3); }, // 5 Mars
      () => { arc(0,-h*.22,h*.34,0,Math.PI*2); ln(0,h*.12,0,h*.82); ln(-h*.3,h*.47,h*.3,h*.47); }, // 6 Venus
      () => { poly(3,h,-Math.PI/2); poly(3,h,Math.PI/6); },                     // 7 Star of David
      () => { ln(0,-h,0,h); ln(-h*.65,-h*.25,h*.65,-h*.25); },                  // 8 Cross
      () => { circle(h*.5); poly(3,h*.5,-Math.PI/2); },                         // 9 Trine+circle
      () => { arc(-h*.36,0,h*.28,0,Math.PI*2); arc(h*.36,0,h*.28,0,Math.PI*2); ln(-h*.08,0,h*.08,0); }, // 10 Opposition
      () => { arc(-h*.22,0,h*.38,0,Math.PI*2); arc(h*.22,0,h*.38,0,Math.PI*2); }, // 11 Conjunction
    ];
    D[i]();
  }

  // ── RUNIC ──
  else if (set === 'runic') {
    const D = [
      () => { ln(-h*.15,-h,-h*.15,h); ln(-h*.15,-h*.5,h*.48,-h*.15); ln(-h*.15,0,h*.48,h*.35); }, // 0 Fehu ᚠ
      () => { B();M(-h*.38,-h);L(-h*.38,h*.28);ctx.arc(0,h*.28,h*.38,Math.PI,0);L(h*.38,-h);S(); }, // 1 Uruz ᚢ
      () => { ln(-h*.28,-h,-h*.28,h); B();M(-h*.28,-h*.35);L(h*.52,0);L(-h*.28,h*.35);S(); }, // 2 Thurisaz ᚦ
      () => { ln(-h*.25,-h,-h*.25,h); ln(-h*.25,-h*.5,h*.35,-h); ln(-h*.25,0,h*.35,-h*.5); }, // 3 Ansuz ᚨ
      () => { ln(-h*.3,-h,-h*.3,h); B();M(-h*.3,-h*.8);L(h*.38,-h*.4);L(-h*.3,0);S(); ln(-h*.3,0,h*.48,h); }, // 4 Raidho ᚱ
      () => { B();M(h*.38,-h*.75);L(-h*.28,0);L(h*.38,h*.75);S(); },            // 5 Kenaz ᚲ
      () => { ln(-h*.58,-h,h*.58,h); ln(h*.58,-h,-h*.58,h); },                  // 6 Gebo ᚷ X
      () => { ln(-h*.3,-h,-h*.3,h); B();M(-h*.3,-h);L(h*.38,-h*.5);L(-h*.3,0);S(); }, // 7 Wunjo ᚹ
      () => { ln(-h*.32,-h,-h*.32,h); ln(h*.32,-h,h*.32,h); ln(-h*.32,h*.1,h*.32,-h*.1); }, // 8 Hagalaz ᚺ
      () => { ln(0,-h,0,h); ln(-h*.32,-h,h*.32,-h); ln(-h*.32,h,h*.32,h); },   // 9 Isa ᛁ
      () => { ln(0,-h,0,h); B();M(-h*.52,0);L(0,-h);L(h*.52,0);S(); },         // 10 Tiwaz ᛏ ↑
      () => { ln(-h*.25,-h,-h*.25,h); B();M(-h*.25,-h);L(h*.32,-h*.62);L(-h*.25,-h*.18);S(); B();M(-h*.25,-h*.18);L(h*.38,h*.28);L(-h*.25,h);S(); }, // 11 Berkana ᛒ
    ];
    D[i]();
  }

  // ── MISC ──
  else if (set === 'misc') {
    const D = [
      () => { B();M(-h,0);ctx.quadraticCurveTo(0,-h*.75,h,0);ctx.quadraticCurveTo(0,h*.75,-h,0);S(); circle(h*.3); B();ctx.arc(0,0,h*.1,0,Math.PI*2);F(); }, // 0 Eye
      () => { arc(0,-h*.3,h*.3,0,Math.PI*2); ln(0,0,0,h); ln(-h*.48,-h*.12,h*.48,-h*.12); }, // 1 Ankh
      () => { ln(-h*.72,-h*.72,h*.72,h*.72); ln(h*.72,-h*.72,-h*.72,h*.72); ln(-h*.65,-h*.28,-h*.28,-h*.65); ln(h*.28,h*.65,h*.65,h*.28); }, // 2 Swords
      () => { const p5=Array.from({length:5},(_,k)=>[Math.cos(k/5*Math.PI*2-Math.PI/2)*h,Math.sin(k/5*Math.PI*2-Math.PI/2)*h]); for(let k=0;k<5;k++){B();M(p5[k][0],p5[k][1]);L(p5[(k+2)%5][0],p5[(k+2)%5][1]);S();} }, // 3 Pentagram
      () => { B();M(0,0);ctx.bezierCurveTo(-h*.3,-h,-h,-h,-h,0);ctx.bezierCurveTo(-h,h,-h*.3,h,0,0);ctx.bezierCurveTo(h*.3,-h,h,-h,h,0);ctx.bezierCurveTo(h,h,h*.3,h,0,0);S(); }, // 4 Infinity ∞
      () => { B();M(-h*.58,-h*.8);L(h*.58,-h*.8);L(h*.58,h*.1);ctx.quadraticCurveTo(h*.58,h,0,h);ctx.quadraticCurveTo(-h*.58,h,-h*.58,h*.1);ctx.closePath();S(); ln(0,-h*.8,0,h*.6); ln(-h*.58,-h*.2,h*.58,-h*.2); }, // 5 Shield
      () => { ln(0,-h,0,h); ln(-h*.4,-h*.52,-h*.4,-h); ln(h*.4,-h*.52,h*.4,-h); B();M(-h*.4,-h*.52);ctx.quadraticCurveTo(-h*.4,-h*.68,0,-h*.68);ctx.quadraticCurveTo(h*.4,-h*.68,h*.4,-h*.52);S(); }, // 6 Trident
      () => { arc(0,0,h*.5,0.28,Math.PI*2-.15); B();M(h*.38,h*.28);L(h*.72,h*.08);L(h*.5,-h*.18);ctx.closePath();F(); }, // 7 Ouroboros
      () => { B();M(-h*.6,h*.42);L(-h*.6,-h*.22);L(-h*.15,h*.12);L(0,-h*.68);L(h*.15,h*.12);L(h*.6,-h*.22);L(h*.6,h*.42);ctx.closePath();S(); }, // 8 Crown
      () => { circle(h*.38); for(let k=0;k<6;k++){const a=k/6*Math.PI*2;arc(Math.cos(a)*h*.38,Math.sin(a)*h*.38,h*.38,0,Math.PI*2);} }, // 9 Flower of Life
      () => { circle(h*.5); arc(0,-h*.25,h*.25,Math.PI*.5,Math.PI*1.5); arc(0,h*.25,h*.25,Math.PI*1.5,Math.PI*.5); }, // 10 Yin-yang
      () => { B();for(let k=0;k<100;k++){const a=k/100*Math.PI*6,r=k/100*h;L(Math.cos(a)*r,Math.sin(a)*r);}S(); }, // 11 Spiral
    ];
    D[i]();
  }

  // ── GEOMETRIC ──
  else {
    const D = [
      () => poly(3, h, -Math.PI/2),                                             // 0 Triangle
      () => poly(4, h, -Math.PI/4),                                             // 1 Square
      () => poly(5, h, -Math.PI/2),                                             // 2 Pentagon
      () => poly(6, h, 0),                                                      // 3 Hexagon
      () => poly(8, h, Math.PI/8),                                              // 4 Octagon
      () => { poly(3,h,-Math.PI/2); poly(3,h,Math.PI/6); },                     // 5 Star of David
      () => { poly(4,h,-Math.PI/4); poly(4,h*.62,-Math.PI/4+.42); },            // 6 Nested squares
      () => { circle(h*.5); circle(h*.27); for(let k=0;k<4;k++){const a=k/4*Math.PI*2;ln(0,0,Math.cos(a)*h*.5,Math.sin(a)*h*.5);} }, // 7 Grid
      () => { B();ctx.arc(-h*.25,0,h*.5,Math.PI*.5,Math.PI*1.5,true);ctx.arc(h*.25,0,h*.5,Math.PI*1.5,Math.PI*.5,true);ctx.closePath();S(); }, // 8 Vesica
      () => { B();M(0,-h);L(h*.62,0);L(0,h);L(-h*.62,0);ctx.closePath();S(); }, // 9 Diamond
      () => { circle(h*.5); for(let k=0;k<6;k++){const a=k/6*Math.PI*2;arc(Math.cos(a)*h*.5,Math.sin(a)*h*.5,h*.5,0,Math.PI*2);} }, // 10 Metatron
      () => { poly(3,h,-Math.PI/2); poly(3,h*.78,Math.PI/6); circle(h*.3); },   // 11 Sri Yantra
    ];
    D[i]();
  }

  ctx.restore();
}

// ── GEOMETRY HELPERS ──
function mkPts(cx,cy,r,n,a0){ return Array.from({length:n},(_,k)=>{const a=k/n*Math.PI*2+a0;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];}); }
function circ(ctx,x,y,r){ ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke(); }
function disc(ctx,x,y,r){ ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill(); }
function polyline(ctx,ps){ if(!ps.length)return;ctx.beginPath();ps.forEach(([x,y],i)=>i?ctx.lineTo(x,y):ctx.moveTo(x,y));ctx.closePath();ctx.stroke(); }

function drawCircText(ctx,cx,cy,r,text,sz,sp,font){
  ctx.save();
  ctx.font = sz + 'px ' + (font||'serif');
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const chars = (text + ' * ').split('');
  const n = Math.max(2, Math.floor(2*Math.PI*r / (sz*sp)));
  for(let k=0;k<n;k++){
    const a = k/n*Math.PI*2 - Math.PI/2;
    ctx.save();
    ctx.translate(cx+r*Math.cos(a), cy+r*Math.sin(a));
    ctx.rotate(a + Math.PI/2);
    ctx.fillText(chars[k % chars.length], 0, 0);
    ctx.restore();
  }
  ctx.restore();
}

function drawSubCircle(ctx,x,y,r,set,sz,lc,ac,lw,idx){
  ctx.strokeStyle=lc; ctx.lineWidth=lw*.8;
  circ(ctx,x,y,r); circ(ctx,x,y,r*.68);
  // Mini inner geometry (4 variants)
  ctx.save(); ctx.translate(x,y); ctx.strokeStyle=lc; ctx.lineWidth=lw*.7;
  switch(idx%4){
    case 0: // pentagram
      { const p=Array.from({length:5},(_,k)=>[Math.cos(k/5*Math.PI*2-Math.PI/2)*r*.62,Math.sin(k/5*Math.PI*2-Math.PI/2)*r*.62]);
        for(let k=0;k<5;k++){ctx.beginPath();ctx.moveTo(p[k][0],p[k][1]);ctx.lineTo(p[(k+2)%5][0],p[(k+2)%5][1]);ctx.stroke();} break; }
    case 1: // compass
      for(let k=0;k<8;k++){const a=k/8*Math.PI*2;ctx.beginPath();ctx.moveTo(Math.cos(a)*r*.2,Math.sin(a)*r*.2);ctx.lineTo(Math.cos(a)*r*.62,Math.sin(a)*r*.62);ctx.stroke();}
      circ(ctx,0,0,r*.25); break;
    case 2: // two triangles
      { const t=(n,a0)=>{ctx.beginPath();for(let k=0;k<=3;k++){const a=k/3*Math.PI*2+a0;k?ctx.lineTo(Math.cos(a)*r*.6,Math.sin(a)*r*.6):ctx.moveTo(Math.cos(a)*r*.6,Math.sin(a)*r*.6);}ctx.closePath();ctx.stroke();};t(3,-Math.PI/2);t(3,Math.PI/6); break; }
    case 3: // cross + circle
      ctx.beginPath();ctx.moveTo(-r*.62,0);ctx.lineTo(r*.62,0);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,-r*.62);ctx.lineTo(0,r*.62);ctx.stroke();
      circ(ctx,0,0,r*.3); break;
  }
  // Center symbol
  ctx.strokeStyle=ac; ctx.fillStyle=ac;
  DS(ctx, set, idx, sz*.88);
  ctx.restore();
  ctx.fillStyle=lc; disc(ctx,x,y,lw*1.5);
}

// ── MAIN DRAW FUNCTION ──
function draw(ts) {
  if(_drawing) return;   // re-entrancy guard
  _drawing = true;

  const p = P();  // read ALL params fresh — including symSet
  const cv = document.getElementById('mc');
  const wrap = document.getElementById('wrap');

  // Size canvas to fit container (responsive)
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;
  const side = Math.min(W, H, 900);
  if(cv.width !== side || cv.height !== side) {
    cv.width = side;
    cv.height = side;
  }
  cv.style.width  = side + 'px';
  cv.style.height = side + 'px';
  document.getElementById('infoBar').textContent = side + '×' + side;

  const ctx = cv.getContext('2d');
  sRng(SEED);  // reset RNG — deterministic per seed

  if(p.oAR){
    const dt = _lastT ? (ts - _lastT) / 1000 : 0;
    _rot += dt * 0.05;
    _lastT = ts;
  } else {
    _lastT = 0;
  }

  const cx = side/2, cy = side/2;
  const maxR = side/2 - p.margin;
  const lc = p.lineC, ac = p.accentC, lw = p.lineW;

  ctx.fillStyle = p.bgC;
  ctx.fillRect(0, 0, side, side);

  // Outer border ring
  ctx.strokeStyle = ac; ctx.lineWidth = p.borderW;
  circ(ctx, cx, cy, maxR);
  ctx.strokeStyle = lc; ctx.lineWidth = lw;
  circ(ctx, cx, cy, maxR - p.borderSp*.3);
  circ(ctx, cx, cy, maxR - p.borderSp*.55);

  // Font per symbol set — all text in the circle uses the same typeface
  const SET_FONTS = {
    alchemical: "'Pirata One', serif",
    celestial:  "'Cinzel', serif",
    runic:      "'UnifrakturMaguntia', cursive",
    misc:       "'Almendra', serif",
    geometric:  "'Share Tech Mono', monospace",
  };
  const ringFont = SET_FONTS[p.symSet] || "'Cinzel', serif";

  // Text rings
  ctx.fillStyle = lc;
  if(p.oT1) drawCircText(ctx, cx, cy, maxR - p.borderSp*.15, p.rt1, p.txtSz, p.txtSp, ringFont);
  if(p.oT2) drawCircText(ctx, cx, cy, maxR - p.borderSp*.70, p.rt2, p.txtSz*.85, p.txtSp, ringFont);

  // SYMBOL BAND between text rings - changes with Symbol Library Set
  {
    const symBandR = maxR - p.borderSp * 0.42;
    const symBandN = p.numSym * 2;
    const symBandSz = Math.max(6, Math.min(p.symSz * 0.75, p.borderSp * 0.38));
    ctx.strokeStyle = ac; ctx.fillStyle = ac;
    for(let i = 0; i < symBandN; i++){
      const a = i / symBandN * Math.PI * 2 + _rot * 0.3;
      ctx.save();
      ctx.translate(cx + symBandR * Math.cos(a), cy + symBandR * Math.sin(a));
      ctx.rotate(a + Math.PI / 2);
      DS(ctx, p.symSet, i, symBandSz);
      ctx.restore();
    }
  }

  // Inner boundary
  const innerR = maxR - p.bordSp2;
  ctx.strokeStyle = lc; ctx.lineWidth = p.borderW*.7;
  circ(ctx, cx, cy, innerR);
  ctx.lineWidth = lw;
  circ(ctx, cx, cy, innerR - p.borderSp*.15);

  // Tier radii
  const subR = innerR * p.subSc;
  const tierR = Array.from({length: p.tiers}, (_, t) => innerR * (1 - t * (0.9/p.tiers)));

  for(let t = 0; t < p.tiers; t++){
    const r = tierR[t];
    const ns = Math.max(3, Math.round(p.numSym + t * p.deltaSym));
    const tr = _rot + t * Math.PI / ns;
    const vs = mkPts(cx, cy, r, ns, tr);

    ctx.strokeStyle = lc; ctx.lineWidth = lw;
    if(t > 0) polyline(ctx, vs);
    if(p.oCB && t===0){ ctx.globalAlpha=.5; polyline(ctx,vs); ctx.globalAlpha=1; }
    if(p.oMP){ ctx.globalAlpha=.3; polyline(ctx, mkPts(cx,cy,r*.75,ns,tr+Math.PI/ns)); ctx.globalAlpha=1; }
    if(p.oCP){
      ctx.globalAlpha=.35; ctx.lineWidth=lw*.7;
      const sk = Math.min(p.conSkip, Math.floor(ns/2));
      for(let a=0;a<ns;a++) for(let b=a+sk;b<ns;b+=sk){
        ctx.beginPath();ctx.moveTo(vs[a][0],vs[a][1]);ctx.lineTo(vs[b][0],vs[b][1]);ctx.stroke();
      }
      ctx.globalAlpha=1; ctx.lineWidth=lw;
    }
    if(p.oLC){
      ctx.globalAlpha=.25; ctx.lineWidth=lw*.6;
      vs.forEach(([vx,vy])=>{ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(vx,vy);ctx.stroke();});
      ctx.globalAlpha=1; ctx.lineWidth=lw;
    }
    if(p.oIP){
      ctx.strokeStyle=lc; ctx.fillStyle=lc;
      vs.forEach(([vx,vy])=>{ disc(ctx,vx,vy,lw*2); ctx.lineWidth=lw*.6; circ(ctx,vx,vy,lw*4); ctx.lineWidth=lw; });
    }
    if(p.oSC && t===0){
      vs.forEach(([vx,vy],i) => drawSubCircle(ctx,vx,vy,subR,p.symSet,p.symSz,lc,ac,lw,i));
    }
    if(p.oSP && t>0){
      ctx.strokeStyle=ac; ctx.fillStyle=ac;
      vs.forEach(([vx,vy],i)=>{ ctx.save(); ctx.translate(vx,vy); DS(ctx,p.symSet,t*7+i,p.symSz); ctx.restore(); });
    }
  }

  // Inner geometry web
  if(p.oIG){
    const wR = tierR[p.tiers-1]*.85;
    const wN = Math.max(3, Math.round(p.numSym + p.tiers*p.deltaSym));
    const wv = mkPts(cx,cy,wR,wN,_rot+Math.PI/wN);
    ctx.strokeStyle=lc; ctx.globalAlpha=.4; ctx.lineWidth=lw*.6;
    const cm = Math.ceil(p.complex*wN);
    for(let a=0;a<wv.length;a++) for(let b=a+1;b<Math.min(a+1+cm,wv.length);b++){
      ctx.beginPath();ctx.moveTo(wv[a][0],wv[a][1]);ctx.lineTo(wv[b][0],wv[b][1]);ctx.stroke();
    }
    ctx.globalAlpha=.3; ctx.lineWidth=lw*.5;
    const lvl = Math.floor(p.tiers*1.5);
    for(let i=1;i<=lvl;i++) circ(ctx,cx,cy,wR*i/lvl);
    ctx.globalAlpha=1;
  }

  // Symbol ring
  if(p.oSR){
    const srR=innerR*.5, srN=p.numSym*2;
    ctx.strokeStyle=ac; ctx.fillStyle=ac;
    for(let i=0;i<srN;i++){
      const a=i/srN*Math.PI*2+_rot;
      ctx.save(); ctx.translate(cx+srR*Math.cos(a),cy+srR*Math.sin(a)); ctx.rotate(a+Math.PI/2);
      DS(ctx,p.symSet,i,p.symSz*.9); ctx.restore();
    }
  }

  // Decorative tick marks at border (numSym positions)
  ctx.strokeStyle=ac; ctx.lineWidth=lw*1.2; ctx.globalAlpha=.5;
  for(let i=0;i<p.numSym;i++){
    const a = i/p.numSym*Math.PI*2 + _rot*.3;
    const r1 = maxR - p.borderSp*.08, r2 = maxR - p.borderSp*.22;
    ctx.beginPath();
    ctx.moveTo(cx+r1*Math.cos(a), cy+r1*Math.sin(a));
    ctx.lineTo(cx+r2*Math.cos(a), cy+r2*Math.sin(a));
    ctx.stroke();
  }
  ctx.globalAlpha=1;

  // Center
  ctx.strokeStyle=lc; ctx.lineWidth=lw;
  circ(ctx,cx,cy,innerR*.12); ctx.lineWidth=lw*.6; circ(ctx,cx,cy,innerR*.06);
  ctx.fillStyle=lc; disc(ctx,cx,cy,lw*2);
  if(p.oSP){
    ctx.save(); ctx.translate(cx,cy);
    ctx.strokeStyle=ac; ctx.fillStyle=ac;
    DS(ctx, p.symSet, Math.floor(SEED*12), p.symSz*1.6);
    ctx.restore();
  }

  _drawing = false;
  if(p.oAR) _frame = requestAnimationFrame(draw);
}

// ── SINGLE ENTRY POINT ──
function go() {
  // Cancel any running animation
  if(_frame !== null){ cancelAnimationFrame(_frame); _frame = null; }
  _drawing = false;
  _lastT = 0;
  const animate = document.getElementById('oAR').checked;
  if(animate) {
    _frame = requestAnimationFrame(draw);
  } else {
    draw(0);
  }
}

// ── RANDOMIZE ──
function randomize(){
  const ri=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
  const rf=(a,b)=>+(Math.random()*(b-a)+a).toFixed(2);
  document.getElementById('tiers').value    = ri(2,5);
  document.getElementById('numSym').value   = ri(4,10);
  document.getElementById('complexity').value = rf(.2,.9);
  document.getElementById('subSc').value    = rf(.08,.28);
  document.getElementById('deltaSym').value = ri(-2,1);
  document.getElementById('conSkip').value  = ri(1,4);
  document.getElementById('bordSp2').value  = ri(25,80);
  document.getElementById('txtSz').value    = ri(7,14);
  document.getElementById('symSz').value    = ri(10,24);
  document.getElementById('borderW').value  = rf(3,9);
  document.getElementById('lineW').value    = rf(.8,3);
  const sets = ['alchemical','celestial','runic','misc','geometric'];
  document.getElementById('symSet').value   = sets[ri(0,4)];
  const hue = ri(0,359);
  const h2r = (h,s,l) => {
    s/=100;l/=100;const k=n=>(n+h/30)%12,a=s*Math.min(l,1-l),f=n=>l-a*Math.max(-1,Math.min(k(n)-3,9-k(n),1));
    return [f(0)*255,f(8)*255,f(4)*255];
  };
  const hex = r=>'#'+r.map(x=>Math.round(x).toString(16).padStart(2,'0')).join('');
  document.getElementById('bgC').value    = hex(h2r(hue,40,8));
  document.getElementById('lineC').value  = hex(h2r((hue+180)%360,8,92));
  document.getElementById('accentC').value= hex(h2r((hue+60)%360,85,55));
  newSeed();
}

function newSeed(){
  SEED = Math.random();
  document.getElementById('seedD').textContent = 'Seed: ' + SEED.toFixed(10);
  go();
}

// ══ PWA ══════════════════════════════════════════════
const APP_VERSION = '1.1';

// ── Registro del Service Worker ──────────────────────
let _swReg = null;
let _waitingSW = null;

if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      _swReg = await navigator.serviceWorker.register('./sw.js');
      console.log('[SW] Registrado:', _swReg.scope);

      // Detectar SW en espera desde el primer momento
      if (_swReg.waiting) handleWaitingSW(_swReg.waiting);

      // Detectar nueva versión descargándose
      _swReg.addEventListener('updatefound', () => {
        const newSW = _swReg.installing;
        if (!newSW) return;
        newSW.addEventListener('statechange', () => {
          // El nuevo SW está instalado y en espera → mostrar banner
          if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
            handleWaitingSW(newSW);
          }
        });
      });

      // Sondeo periódico: verificar si hay actualización disponible
      setInterval(() => _swReg.update().catch(() => {}), 60 * 60 * 1000); // cada 1h

    } catch (err) {
      console.warn('[SW] Error:', err);
    }
  });

  // Cuando el SW nuevo toma control, recargar la página
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    window.location.reload();
  });

  // Escuchar mensajes del SW (ej. SW_VERSION)
  navigator.serviceWorker.addEventListener('message', event => {
    if (event.data?.type === 'SW_VERSION') {
      const swVer = event.data.version;
      // Si la versión del SW activo difiere de la app, actualizar etiqueta
      if (swVer && swVer !== APP_VERSION) {
        const lbl = document.getElementById('appVerLabel');
        if (lbl) lbl.textContent = `v${APP_VERSION}`;
      }
    }
  });
}

function handleWaitingSW(sw) {
  _waitingSW = sw;
  // Pedirle al SW en espera su versión para mostrarla en el toast
  sw.postMessage({ type: 'GET_VERSION' });
  // Fallback: mostrar el toast a los 200 ms aunque no responda
  setTimeout(() => showUpdateToast(null), 200);
}

function showUpdateToast(newVersion) {
  const toast = document.getElementById('updateToast');
  const verTxt = document.getElementById('toastVerText');
  if (!toast) return;
  if (newVersion && verTxt) verTxt.textContent = `→ v${newVersion}`;
  toast.classList.add('visible');
}

// Botón "Actualizar" del toast
document.getElementById('toastUpdateBtn').addEventListener('click', () => {
  document.getElementById('updateToast').classList.remove('visible');
  if (_waitingSW) {
    _waitingSW.postMessage({ type: 'SKIP_WAITING' });
    // controllerchange → recargará la página automáticamente
  } else {
    window.location.reload();
  }
});

// Botón "✕" del toast — ignorar esta actualización
document.getElementById('toastCloseBtn').addEventListener('click', () => {
  document.getElementById('updateToast').classList.remove('visible');
});

// ── Install prompt ────────────────────────────────────
let _deferredInstall = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredInstall = e;
  const btn = document.getElementById('installBtn');
  if (btn) btn.style.display = 'inline-block';
});

document.getElementById('installBtn').addEventListener('click', async () => {
  if (!_deferredInstall) return;
  _deferredInstall.prompt();
  const { outcome } = await _deferredInstall.userChoice;
  console.log('[PWA] Install outcome:', outcome);
  _deferredInstall = null;
  document.getElementById('installBtn').style.display = 'none';
});

window.addEventListener('appinstalled', () => {
  console.log('[PWA] Instalada correctamente ✔');
  _deferredInstall = null;
  document.getElementById('installBtn').style.display = 'none';
});
// ═════════════════════════════════════════════════════
</script>
</body>
</html>
